apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: food-app
  name: food-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: food-app
  template:
    metadata:
      labels:
        app: food-app
    spec:
      containers:
      - name: food-app
        image: nginx
        ports:
        - containerPort: 80
        volumeMounts:
         name: food-app
         mountPath: /data

      volumes:
       name: 
       PersistentVloume
